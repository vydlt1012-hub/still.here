backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "posts"
    label: "Bài viết"
    folder: "posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Tiêu đề", name: "title", widget: "string" }
      - { label: "Ngày đăng", name: "date", widget: "datetime", format: "DD/MM/YYYY" }
      - { label: "Chủ đề", name: "tag", widget: "string", default: "Suy nghĩ" }
      - { label: "Thời gian đọc (phút)", name: "readtime", widget: "number", default: 3 }
      - { label: "Tóm tắt", name: "excerpt", widget: "text" }
      - { label: "Nội dung", name: "body", widget: "markdown" }
